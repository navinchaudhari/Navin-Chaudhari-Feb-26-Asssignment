<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        body {
            background-color: #c9cfd4;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 50px auto;
            width: 450px;
            height: 500px;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.397);
        }

        #user-form {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 450px;
            padding: 25px;

        }

        #user-form input {
            margin: 10px;
            padding: 10px 20px;
            text-decoration: none;
            border: none;
            outline: none;
            font-size: large;
            background-color: rgb(255, 255, 255);
            color: blck;
            text-decoration: none;
        }

        #btn-submit {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            border: none;
            outline: none;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 50%;
            font-size: large;
            padding: 5px 20px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div>
            <h1>Register</h1>
        </div>
        <div>
            <form action="#" id="user-form" onsubmit="printUser()">
                <input type="text" placeholder="Enter First Name" id="first-name">
                <input type="text" placeholder="Enter Last Name" id="last-name">
                <input type="text" placeholder="Enter Contact No" id="contact-no">
                <input type=" text" placeholder="Enter Email" id="email">
                <button type="submit" id="btn-submit">Submit</button>
            </form>
        </div>
        <h3 id="result"></h3>

    </div>
    <script>
        function printUser() {




            const fname = document.getElementById("first-name").value;
            const lname = document.getElementById("last-name").value;
            const contact = document.getElementById("contact-no").value;
            const email = document.getElementById("email").value;
            document.getElementById("result").innerHTML =
                "First Name: " + fname + "<br>" +
                "Last Name: " + lname + "<br>" +
                "Contact: " + contact + "<br>" +
                "Email: " + email;
        }
    </script>
</body>

</html>
