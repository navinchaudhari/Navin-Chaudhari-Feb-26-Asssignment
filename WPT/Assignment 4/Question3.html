<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        function fetchData(url, callback) {

            setTimeout(() => {
                const response = `Response from ${url}: Data retrieved successfully!`;
                callback(response);
            }, 2000);
        }

        fetchData("https://www.google.com", (data) => {
            console.log(data);
        });
    </script>
</body>

</html>
