<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/contactus.css">
</head>

<body>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left">
            <h2>Get in touch</h2>

            <div class="info">
                <p><i class="fa-solid fa-user"></i> Name <br> HTML CSS Tutorials</p>
                <p><i class="fa-solid fa-envelope"></i> Email <br> htmlcsstutorials@gmail.com</p>
                <p><i class="fa-solid fa-phone"></i> Phone <br> +91 1234567890</p>
                <p><i class="fa-solid fa-location-dot"></i> Address <br> 123 Street, Bangalore, India, 500001</p>
            </div>

            <!-- Social Icons -->
            <div class="social">
                <i class="fa-brands fa-facebook-f"></i>
                <i class="fa-brands fa-twitter"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-youtube"></i>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right">
            <h2>Contact Us</h2>

            <form>
                <input type="text" placeholder="Full Name" value="HTMLCSS Tutorials">
                <input type="email" placeholder="Email ID" value="hhhh@">
                <input type="text" placeholder="Website">
                <input type="text" placeholder="Contact Number">
                <textarea placeholder="Message"></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

    </div>

</body>

</html>
